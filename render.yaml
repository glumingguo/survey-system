services:
  - type: web
    name: survey-system-api
    env: node
    region: us-east
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # 使用 Neon 数据库连接字符串
        sync: false
      - key: JWT_SECRET
        generateValue: true
    plan: free
