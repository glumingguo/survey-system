services:
  - type: web
    name: survey-system-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: survey-system-api
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    plan: free
